name: GitHub Metrics

on:
  schedule:
    - cron: "0 0 * * 0"  # Runs weekly on Sunday at midnight UTC
  workflow_dispatch:  # Allows manual trigger
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: General Stats
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/github-stats.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: muktarsayedsaleh
          template: classic
          base: header, activity, community, repositories
          config_timezone: Asia/Dubai
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_sections: base

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: muktarsayedsaleh
          template: classic
          base: ""
          config_timezone: Asia/Dubai
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_details: percentage

      - name: Contribution Calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/contributions.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: muktarsayedsaleh
          template: classic
          base: ""
          config_timezone: Asia/Dubai
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/achievements.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: muktarsayedsaleh
          template: classic
          base: ""
          config_timezone: Asia/Dubai
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: B

      - name: Coding Habits
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/habits.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: muktarsayedsaleh
          template: classic
          base: ""
          config_timezone: Asia/Dubai
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200

      - name: Notable Contributions
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/notable.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: muktarsayedsaleh
          template: classic
          base: ""
          config_timezone: Asia/Dubai
          plugin_notable: yes
          plugin_notable_from: all
          plugin_notable_repositories: yes

      - name: Recent Activity
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/activity.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: muktarsayedsaleh
          template: classic
          base: ""
          config_timezone: Asia/Dubai
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 5
          plugin_activity_visibility: public
